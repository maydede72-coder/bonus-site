<style>
body{
margin:0;
background:#050505;
color:white;
font-family:Arial;
}

.header{
background:linear-gradient(90deg,#0f3d2e,#1f7a5a);
padding:12px;
text-align:center;
font-weight:bold;
animation:glow 2s infinite;
}

@keyframes glow{
50%{box-shadow:0 0 20px #1f7a5a;}
}

.online{
text-align:center;
color:#7dffcb;
margin:5px;
}

.card{
position:relative;
display:flex;
justify-content:space-between;
align-items:center;
background:#0f0f0f;
margin:10px;
padding:10px;
border-radius:10px;
border:1px solid #1f7a5a;
animation:fade .4s ease;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:scale(1.02);
box-shadow:0 0 15px #1f7a5a;
}

/* NEON */
.card::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:2px;
background:linear-gradient(90deg,transparent,#3cffb0,transparent);
animation:slide 3s linear infinite;
}

@keyframes slide{
0%{left:-100%;}
100%{left:100%;}
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

.price{
color:#7dffcb;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0.3;}
}

.desc{
text-shadow:0 0 8px #3cffb0;
overflow:hidden;
white-space:nowrap;
border-right:2px solid #3cffb0;
animation:typing 2s steps(30,end), blinkCursor .6s infinite;
}

@keyframes typing{
from{width:0;}
to{width:100%;}
}

@keyframes blinkCursor{
50%{border-color:transparent;}
}

/* BUTTON */
button{
background:linear-gradient(90deg,#0f3d2e,#1f7a5a);
border:none;
color:white;
padding:8px;
border-radius:6px;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
50%{transform:scale(1.08);}
}

button:active{
transform:scale(0.95);
}

button:hover{
transform:scale(1.1);
}

.vip{
border:1px solid gold;
box-shadow:0 0 10px gold;
}

/* MOBİL */
@media (max-width:600px){

.card{
flex-direction:column;
text-align:center;
}

.card img{
width:120px;
margin-bottom:10px;
}

.desc{
white-space:normal;
border:none;
animation:none;
font-size:14px;
}

.price{
font-size:20px;
}

button{
width:100%;
margin-top:10px;
padding:12px;
font-size:16px;
}

.header{
font-size:18px;
}

}

/* 🔥 POPUP */
#popup{
position:fixed;
bottom:20px;
left:20px;
background:#0f0f0f;
border:1px solid #1f7a5a;
padding:10px;
border-radius:10px;
display:none;
z-index:999;
color:#7dffcb;
box-shadow:0 0 10px #1f7a5a;
font-size:14px;
}

</style>

{img:"viabetlogo.png",price:"200 ₺",text:"FreeSpin Deneme Bonusu",link:"https://viakisalink.com/qortem",clicks:2},
{img:"bayspin.png",price:"250 ₺",text:"Şartsız Bonus",link:"https://cutt.ly/OtKtz05x",clicks:7}
];

name+" "+money+"₺ kazandı!";

p.style.display="none";

</script>
