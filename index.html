<!DOCTYPE html>
<html lang="tr">
<head>
<title>Deneme Bonusu Veren Siteler 2026 | Güncel Bonuslar</title>
<meta name="robots" content="index, follow">
<meta name="description" content="En güncel deneme bonusu veren siteler, 444 TL bonus, yatırım şartsız bonus listesi.">
<meta name="keywords" content="deneme bonusu, yatırım şartsız bonus, casino bonus, free spin, bonus siteleri">
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#050505;color:white;font-family:Arial;}

.header{
background:linear-gradient(90deg,#0f3d2e,#1f7a5a);
padding:12px;text-align:center;font-weight:bold;
animation:glow 2s infinite;
}

@keyframes glow{50%{box-shadow:0 0 20px #1f7a5a;}}

.hero{
text-align:center;
padding:10px;
font-size:22px;
color:#3cffb0;
text-shadow:0 0 10px #3cffb0;
}

.categories{
display:flex;
gap:10px;
overflow:auto;
padding:10px;
}

.cat{
padding:8px 14px;
border-radius:20px;
background:#0f0f0f;
border:1px solid #1f7a5a;
cursor:pointer;
white-space:nowrap;
box-shadow:0 0 8px #1f7a5a;
}

.cat.active{background:#1f7a5a;}

.online{text-align:center;color:#7dffcb;margin:5px;}

.card{
position:relative;
display:flex;
justify-content:space-between;
align-items:center;
background:#0f0f0f;
margin:10px;
padding:10px;
border-radius:10px;
border:1px solid #1f7a5a;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:2px;
background:linear-gradient(90deg,transparent,#3cffb0,transparent);
animation:slide 3s linear infinite;
}

@keyframes slide{
0%{left:-100%;}
100%{left:100%;}
}

.price{color:#7dffcb;}
.desc{text-shadow:0 0 8px #3cffb0;}

button{
background:linear-gradient(90deg,#0f3d2e,#1f7a5a);
border:none;
color:white;
padding:8px;
border-radius:6px;
cursor:pointer;
}

/* TELEGRAM */
.tg{
position:fixed;
bottom:20px;
right:20px;
background:#0088cc;
color:white;
padding:12px 16px;
border-radius:50px;
font-weight:bold;
box-shadow:0 0 15px #0088cc;
z-index:999;
}

/* SAYFALAR */
.page{display:none;padding:10px;}
.activePage{display:block;}

@media (max-width:600px){
.card{flex-direction:column;text-align:center;}
.card img{width:120px;margin-bottom:10px;}
button{width:100%;margin-top:10px;}
}
</style>
</head>

<body>

<div class="header">🔥 BONUS SİTELERİ</div>

<div class="hero">💰 KAZANDIRAN SİTELER 💰</div>

<div class="categories">
<div class="cat active" onclick="filter('all')">Tümü</div>
<div class="cat" onclick="filter('fs')">FreeSpin</div>
<div class="cat" onclick="filter('yatirimsiz')">Yatırımsız</div>
</div>

<div class="online" id="online">Online: 134</div>

<div id="home" class="page activePage">
<div id="list"></div>
</div>

<div id="about" class="page">
<h2>Hakkımızda</h2>
<p>Bu site en güncel deneme bonuslarını paylaşır.</p>
</div>

<div id="contact" class="page">
<h2>İletişim</h2>
<p>Telegram üzerinden ulaş:</p>
<a href="https://t.me/qortem" target="_blank">Telegram'a Git</a>
</div>

<div class="categories">
<div class="cat" onclick="showPage('home')">Ana Sayfa</div>
<div class="cat" onclick="showPage('about')">Hakkında</div>
<div class="cat" onclick="showPage('contact')">İletişim</div>
</div>

<a href="https://t.me/qortem" class="tg">Telegram</a>

<script>

setInterval(()=>{
let sayı = 120 + Math.floor(Math.random()*60);
document.getElementById("online").innerText="Online: "+sayı;
},2000);

const sites = [
{img:"img1.png",price:"444 ₺",text:"Yatırımsız Bonus",link:"https://primeaffiliates1.com/register/47694",cat:"yatirimsiz"},
{img:"viabetlogo.png",price:"200 ₺",text:"FreeSpin Bonus",link:"https://viakisalink.com/qortem",cat:"fs"},
{img:"bayspin.png",price:"250 ₺",text:"Şartsız Bonus",link:"https://cutt.ly/OtKtz05x",cat:"fs"}
];

const list=document.getElementById("list");

function render(data){
list.innerHTML="";
data.forEach(s=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${s.img}" width="90">
<div>
<div class="price">${s.price}</div>
<div class="desc">${s.text}</div>
</div>
<button onclick="go('${s.link}')">BONUS AL</button>
`;

list.appendChild(div);
});
}

render(sites);

function filter(type){
if(type==="all") render(sites);
else render(sites.filter(s=>s.cat===type));
}

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
document.getElementById(id).classList.add("activePage");
}

function go(link){
setTimeout(()=>location.href=link,800);
}

</script>
<script>

/* 🔥 ADMIN PANEL */

/* gizli açma */
let clickCount=0;
document.querySelector(".header").onclick=()=>{
clickCount++;
if(clickCount>=3){
openAdmin();
clickCount=0;
}
};

/* panel */
function openAdmin(){

let pass=prompt("Admin Şifre:");
if(pass!=="admin123") return;

let panel=document.createElement("div");
panel.style.position="fixed";
panel.style.top="50%";
panel.style.left="50%";
panel.style.transform="translate(-50%,-50%)";
panel.style.background="#0f0f0f";
panel.style.padding="20px";
panel.style.border="1px solid #1f7a5a";
panel.style.zIndex="9999";

panel.innerHTML=`
<h3>ADMIN PANEL</h3>

<input id="a_img" placeholder="Resim URL"><br>
<input id="a_price" placeholder="Fiyat"><br>
<input id="a_text" placeholder="Açıklama"><br>
<input id="a_link" placeholder="Link"><br>

<button onclick="addSite()">EKLE</button>
<button onclick="closeAdmin()">KAPAT</button>
`;

document.body.appendChild(panel);
window.adminPanel=panel;
}

/* kapat */
function closeAdmin(){
adminPanel.remove();
}

/* ekle */
function addSite(){

let s={
img:document.getElementById("a_img").value,
price:document.getElementById("a_price").value,
text:document.getElementById("a_text").value,
link:document.getElementById("a_link").value,
cat:"fs"
};

/* eski kayıt */
let old=JSON.parse(localStorage.getItem("extraSites")||"[]");
old.push(s);
localStorage.setItem("extraSites",JSON.stringify(old));

render([...sites,...old]);

alert("Eklendi!");
}

/* load */
window.addEventListener("load",()=>{
let extra=JSON.parse(localStorage.getItem("extraSites")||"[]");
if(extra.length>0){
render([...sites,...extra]);
}
});

</script>
</body>
</html>
